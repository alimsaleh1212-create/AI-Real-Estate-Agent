version: "3.9"

services:
  # FastAPI backend — prediction and insights API
  api:
    build: .
    image: ai-real-estate-agent
    ports:
      - "8000:8000"
    env_file:
      - .env          # injects GOOGLE_API_KEY into the container
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Streamlit UI — calls src functions directly (no HTTP to api service)
  ui:
    image: ai-real-estate-agent
    command:
      - streamlit
      - run
      - app/ui.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true   # required in Docker (no browser auto-open)
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
