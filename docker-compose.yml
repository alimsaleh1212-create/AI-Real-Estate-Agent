services:
  # ── FastAPI backend — prediction and insights API ──────────────────────────
  api:
    build: .
    image: ai-real-estate-agent:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-net

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  # Calls src/ functions directly — no HTTP dependency on the api service.
  ui:
    image: ai-real-estate-agent:latest
    restart: unless-stopped
    command:
      - streamlit
      - run
      - ui/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
